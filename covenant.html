<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE COVENANT // FAMILY LOG</title>

    <script>
        if (!localStorage.getItem('KORE_Identity_Locked')) {
            window.location.href = 'teaser.html';
        }
    </script>

    <style>
        :root { --gold: #d4af37; --noir: #050505; --glass: rgba(15, 15, 15, 0.9); }

        body {
            margin: 0; background: var(--noir) url('atrium_8k.webp') center/cover no-repeat;
            font-family: 'Georgia', serif; color: #fdfbf7;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-y: auto; padding: 40px 0;
        }

        .covenant-vault {
            width: 90%; max-width: 650px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid var(--gold);
            padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,1);
            display: flex; flex-direction: column; margin-bottom: 40px;
        }

        h1 {
            color: var(--gold); letter-spacing: 6px; text-transform: uppercase;
            font-size: 0.9rem; text-align: center; margin-bottom: 25px;
        }

        /* --- THE LOG LIST --- */
        #log-display {
            max-height: 400px; overflow-y: auto; margin-bottom: 25px;
            padding-right: 10px; border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .log-entry {
            margin-bottom: 20px; padding-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            font-size: 0.95rem; line-height: 1.6;
        }

        .log-date {
            font-size: 0.6rem; color: var(--gold); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 5px; opacity: 0.6;
        }

        /* --- THE INPUT FORGE --- */
        .log-forge { display: flex; flex-direction: column; gap: 15px; }

        #log-input {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff; padding: 15px; font-family: 'Georgia', serif;
            resize: none; outline: none; height: 80px; font-size: 1rem;
        }

        .forge-btn {
            background: none; border: 1px solid var(--gold); color: var(--gold);
            padding: 10px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 3px; font-size: 0.7rem; transition: 0.3s;
        }
        .forge-btn:hover { background: var(--gold); color: var(--noir); }

        .back-link {
            text-decoration: none; color: var(--gold); font-size: 0.7rem;
            letter-spacing: 4px; text-transform: uppercase; opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="covenant-vault">
        <h1>Family Covenant Log</h1>
        
        <div id="log-display">
            </div>

        <div class="log-forge">
            <textarea id="log-input" placeholder="Document a new family milestone or observation..."></textarea>
            <button class="forge-btn" onclick="addEntry()">Add to Covenant</button>
        </div>
    </div>

    <a href="guild.html" class="back-link">← RETURN TO ATRIUM</a>

    <script>
        const display = document.getElementById('log-display');
        const input = document.getElementById('log-input');

        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('KORE_Family_Logs') || '[]');
            display.innerHTML = logs.map(entry => `
                <div class="log-entry">
                    <div class="log-date">${entry.date}</div>
                    <div>${entry.text}</div>
                </div>
            `).join('');
            display.scrollTop = display.scrollHeight;
        }

        function addEntry() {
            if (!input.value.trim()) return;
            
            const logs = JSON.parse(localStorage.getItem('KORE_Family_Logs') || '[]');
            const newEntry = {
                date: new Date().toLocaleString(),
                text: input.value.trim()
            };
            
            logs.push(newEntry);
            localStorage.setItem('KORE_Family_Logs', JSON.stringify(logs));
            input.value = '';
            loadLogs();
        }

        window.onload = loadLogs;
    </script>
</body>
</html>
