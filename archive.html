<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHIVE // PROJECT KORE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        if (performance.navigation.type === 1) { window.location.href = "guild.html"; }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        :root { --bg: #050505; --accent: #d4af37; --text: #e0e0e0; --glass: rgba(10, 10, 10, 0.85); }
        [data-palette="LUNAR"] { --bg: #0a0c10; --accent: #a8c0ff; --text: #ffffff; }
        [data-palette="VELLUM"] { --bg: #0f0d0b; --accent: #c4a484; --text: #d2b48c; }
        [data-palette="AMETHYST"] { --bg: #0d0510; --accent: #cd7f32; --text: #9b59b6; }

        body { margin: 0; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; background: var(--bg) url('Apotheosis.png') center/cover no-repeat; color: var(--text); transition: 0.8s; }
        
        .neural-anchor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); opacity: 0; pointer-events: none; z-index: 9999; animation: brainReset 0.166s infinite alternate; }
        @keyframes brainReset { from { opacity: 0; } to { opacity: 0.02; } }
        .breathing-filigree { position: fixed; bottom: -10%; right: -10%; width: 70%; height: 70%; background: radial-gradient(circle at bottom right, var(--accent), transparent 70%); filter: blur(60px); pointer-events: none; animation: somaticBreath 19s infinite ease-in-out; }
        @keyframes somaticBreath { 0%, 100% { opacity: 0.05; transform: scale(1); } 21%, 58% { opacity: 0.3; transform: scale(1.1); } }

        .nav-header { position: absolute; top: 0; width: 100%; padding: 30px 40px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        .artifact-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }

        .workspace { display: flex; flex: 1; padding: 120px 40px 40px; gap: 30px; height: 100vh; box-sizing: border-box; position: relative; z-index: 10; }
        .desk-card { background: var(--glass); border: 1px solid var(--accent); flex: 2; padding: 40px; display: flex; flex-direction: column; backdrop-filter: blur(25px); }
        .entry-title { background: transparent; border: none; border-bottom: 1px solid var(--accent); color: #fff; font-size: 1.8rem; outline: none; margin-bottom: 20px; font-family: inherit; }
        .entry-body { background: transparent; border: none; color: #fdfbf7; font-size: 1.1rem; line-height: 1.6; outline: none; resize: none; flex: 1; font-family: inherit; }
    </style>
</head>
<body x-data="archiveApp()">
    <div class="neural-anchor"></div>
    <div class="breathing-filigree"></div>
    <nav class="nav-header">
        <a href="guild.html" style="color: var(--accent); text-decoration: none; font-size: 0.7rem; letter-spacing: 3px;">◂ GUILD HALL</a>
        <button class="artifact-btn" onclick="toggleAlignment()">✨ ALIGNMENT</button>
    </nav>
    <main class="workspace">
        <section class="desk-card">
            <input type="text" class="entry-title" placeholder="Codify the History...">
            <textarea class="entry-body" placeholder="Whisper your thoughts to the Archive..."></textarea>
            <button class="artifact-btn" style="margin-top:20px; width:100%;">COMMIT TO HISTORY</button>
        </section>
    </main>
    <script>
        const palettes = ['NOIR', 'LUNAR', 'VELLUM', 'AMETHYST'];
        function toggleAlignment() {
            let next = palettes[(palettes.indexOf(localStorage.getItem('KORE_Palette') || 'NOIR') + 1) % palettes.length];
            document.documentElement.setAttribute('data-palette', next);
            localStorage.setItem('KORE_Palette', next);
        }
        document.addEventListener('DOMContentLoaded', () => { document.documentElement.setAttribute('data-palette', localStorage.getItem('KORE_Palette') || 'NOIR'); });
        document.addEventListener('alpine:init', () => { Alpine.data('archiveApp', () => ({ init() {} })) });
    </script>
</body>
</html>
