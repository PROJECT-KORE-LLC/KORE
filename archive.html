<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORE // THE ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,300;0,600;1,300&display=swap');

        :root {
            --obsidian: #020406;
            --gold-leaf: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --amethyst-resonance: rgba(99, 64, 135, 0.4);
            --glass: rgba(5, 8, 15, 0.85);
            --border: 1px solid rgba(197, 160, 89, 0.3);
        }

        body {
            margin: 0; height: 100vh; overflow: hidden;
            font-family: 'Spectral', serif;
            background-color: var(--obsidian);
            background: 
                radial-gradient(circle at center, rgba(2,4,6,0.2) 0%, rgba(2,4,6,0.98) 100%),
                url('gallery_8k.webp') center/cover no-repeat;
            color: #e0d8c3;
            display: flex; flex-direction: column;
            transition: filter 0.5s ease-in-out;
        }

        /* SOVEREIGN VEIL */
        body.is-veiled { filter: blur(80px) brightness(0.05) grayscale(1); }
        body.is-veiled * { pointer-events: none !important; }

        /* SOMATIC 6Hz PULSE */
        @keyframes pulse6Hz {
            0% { opacity: 0; } 50% { opacity: 0.5; } 100% { opacity: 0; }
        }
        #somatic-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--amethyst-resonance) 0%, transparent 80%);
            pointer-events: none; z-index: 5;
            mix-blend-mode: overlay;
            display: none;
        }
        body.pulse-on #somatic-layer { display: block; animation: pulse6Hz 0.166s infinite; }

        /* NAVIGATION */
        .nav-header {
            padding: 40px 60px; display: flex; justify-content: space-between; align-items: center;
            z-index: 100; position: relative;
        }

        .kore-title {
            font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 10px;
            color: var(--gold-leaf); text-shadow: 0 0 20px var(--gold-glow);
            text-transform: uppercase;
        }

        /* WORKSPACE */
        .workspace { display: flex; flex: 1; padding: 0 60px 60px; gap: 40px; overflow: hidden; z-index: 10; position: relative; }

        .desk-card {
            background: var(--glass); backdrop-filter: blur(60px);
            border: var(--border); position: relative;
            flex: 2; display: flex; flex-direction: column; padding: 60px;
            box-shadow: 0 50px 150px rgba(0,0,0,0.9);
        }

        /* GOLD FILIGREE */
        .filigree { position: absolute; width: 60px; height: 60px; border: 1px solid var(--gold-leaf); opacity: 0.5; pointer-events: none; }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        .entry-title {
            background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            color: #fff; font-family: 'Cinzel', serif; font-size: 2.2rem; outline: none;
            margin-bottom: 30px; width: 100%; letter-spacing: 3px;
        }

        .entry-body {
            background: transparent; border: none; color: #d1c7b0;
            font-size: 1.3rem; line-height: 1.8; outline: none; resize: none;
            flex: 1; font-style: italic;
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--glass); backdrop-filter: blur(60px); border: var(--border);
            width: 380px; display: flex; flex-direction: column; padding: 40px;
        }

        .section-label {
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 5px;
            color: var(--gold-leaf); margin-bottom: 30px; opacity: 0.6;
        }

        /* INTERACTIVE ELEMENTS */
        .btn {
            background: transparent; border: 1px solid var(--gold-leaf);
            color: var(--gold-leaf); padding: 15px 30px; cursor: pointer;
            font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 4px;
            transition: 0.4s; text-transform: uppercase;
        }
        .btn:hover { background: var(--gold-leaf); color: #000; box-shadow: 0 0 30px var(--gold-glow); }

        .nerve-btn {
            background: rgba(197, 160, 89, 0.05); border: 1px solid rgba(197, 160, 89, 0.2);
            color: var(--gold-leaf); padding: 10px 20px; font-size: 0.6rem; cursor: pointer;
            letter-spacing: 3px; font-family: 'Cinzel', serif; margin-left: 10px;
            text-transform: uppercase;
        }
        .nerve-btn.active { background: var(--gold-leaf); color: #000; }

        #vault-list div {
            padding: 20px 0; border-bottom: 1px solid rgba(197,160,89,0.1);
            cursor: pointer; transition: 0.3s;
        }
        #vault-list div:hover { padding-left: 10px; color: #fff; }
    </style>
</head>
<body>

    <div id="somatic-layer"></div>

    <nav class="nav-header">
        <div class="kore-title">KORE // ARCHIVE</div>
        <div>
            <button class="nerve-btn" id="btn-grounded" onclick="setNerve('Grounded')">Grounded</button>
            <button class="nerve-btn" id="btn-static" onclick="setNerve('Static')">Static</button>
            <button class="nerve-btn" style="border-color: #634087;" onclick="toggleVeil()">Cloak (Esc)</button>
        </div>
    </nav>

    <main class="workspace">
        <section class="desk-card">
            <div class="filigree top-left"></div>
            <div class="filigree bottom-right"></div>
            
            <input type="text" id="title-input" class="entry-title" placeholder="Lore Title...">
            <textarea id="content-input" class="entry-body" placeholder="Transmute the siege into history..."></textarea>
            <button class="btn" onclick="saveLore()">Commit to History</button>
        </section>

        <aside class="sidebar">
            <div class="section-label">Sovereign Vault</div>
            <div id="vault-list" style="overflow-y: auto; flex: 1;"></div>
        </aside>
    </main>

    <script>
        let entries = JSON.parse(localStorage.getItem('KORE_VAULT_RAW')) || [];
        let currentId = null;

        function setNerve(mode) {
            document.body.classList.remove('pulse-on');
            document.getElementById('btn-grounded').classList.remove('active');
            document.getElementById('btn-static').classList.remove('active');
            
            if(mode === 'Static') {
                document.body.classList.add('pulse-on');
                document.getElementById('btn-static').classList.add('active');
            } else {
                document.getElementById('btn-grounded').classList.add('active');
            }
        }

        function toggleVeil() {
            document.body.classList.toggle('is-veiled');
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') toggleVeil();
        });

        function saveLore() {
            const title = document.getElementById('title-input').value;
            const content = document.getElementById('content-input').value;
            if(!title && !content) return;

            const date = new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            if(currentId) {
                const i = entries.findIndex(e => e.id === currentId);
                entries[i] = { id: currentId, title, content, date };
            } else {
                entries.push({ id: Date.now(), title, content, date });
            }
            
            localStorage.setItem('KORE_VAULT_RAW', JSON.stringify(entries));
            renderVault();
            alert("Lore Anchored.");
        }

        function renderVault() {
            const list = document.getElementById('vault-list');
            list.innerHTML = '';
            entries.slice().reverse().forEach(entry => {
                const item = document.createElement('div');
                item.innerHTML = `<small style="opacity:0.5">${entry.date}</small><br>${entry.title || 'Untitled'}`;
                item.onclick = () => {
                    currentId = entry.id;
                    document.getElementById('title-input').value = entry.title;
                    document.getElementById('content-input').value = entry.content;
                };
                list.appendChild(item);
            });
        }

        // Initialize
        setNerve('Grounded');
        renderVault();
    </script>
</body>
</html>
