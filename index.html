<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORE: Vanguard Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="intro-screen" class="fullscreen-overlay">
        <div class="brand-container">
            <h1 class="kore-title">KORE</h1>
            <p class="kore-tagline">THE SOVEREIGN RECOVERY MULTIVERSE</p>
            <button id="enter-btn" class="sanctuary-btn">ENTER SANCTUARY</button>
        </div>
    </div>

    <div class="hearth-container" onclick="triggerSomaticHijack()">
        <div id="lore-shard" class="glowing-shard" onclick="triggerLore(event)"></div>
        <div class="vignette-overlay"></div>
    </div>

    <div id="somatic-layer" class="somatic-filter">
        <div class="exit-trigger" onclick="dismissHijack(event)">✕ LEAVE PARTY</div>
        
        <div id="party-hud" class="hud-container glass-morphism">
            <div class="hud-header">PULSE-GUILD [ACTIVE]</div>
            <div class="party-member">
                <div class="member-name">AMBER [ARCHITECT] <span class="host-icon">♔</span></div>
                <div class="member-status">HEARTH: <span id="my-flame" class="alert-pulse">LOW EMBER</span></div>
            </div>
            <div class="party-member" style="margin-top: 15px;">
                <div class="member-name">CORY [VISITING]</div>
                <div class="member-status">STATUS: <span class="calm-glow">AEGIS ACTIVE</span></div>
            </div>
        </div>

        <div id="quest-tracker" class="quest-container glass-morphism">
            <div class="hud-header">VANGUARD MISSION</div>
            <div class="quest-name">THE GREY FOG</div>
            <div class="quest-objective">- Cast Aegis (Somatic Regulation)</div>
            <div class="quest-reward">REWARD: +1 SIGNATURE LIGHT</div>
        </div>
    </div>

    <div id="lore-banner" class="lore-notification">
        <span class="gold-text">✦</span> FRAGMENT DECRYPTED: THE SOVEREIGN VOW
    </div>

    <audio id="sanctuary-audio" loop><source src="fire.mp3" type="audio/mpeg"></audio>

    <button id="manifesto-btn" class="manifesto-seal" onclick="triggerInvestorTour()">
        THE MANIFESTO
    </button>

    <script src="scripts.js"></script>
</body>
</html>
