<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC // PROJECT KORE</title>
    <meta name="theme-color" content="#050505">

    <style>
        :root { --gold: #d4af37; --noir: #050505; }
        
        body { 
            margin: 0; background: var(--noir); height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Georgia', serif; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* THE STILL BACKGROUND (No flashing) */
        .bg-anchor { 
            position: fixed; width: 100%; height: 100%; 
            background: url('atrium_8k.webp') center/cover no-repeat; 
            opacity: 0.1; filter: blur(15px) brightness(0.3); 
            z-index: 1;
        }

        /* THE BREATH (Slow, deep, non-seizure inducing) */
        .somatic-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            opacity: 0;
            animation: slowBreathe 8s infinite ease-in-out;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes slowBreathe {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .sync-container {
            text-align: center; z-index: 1010; 
        }

        .sync-text { 
            color: var(--gold); letter-spacing: 10px; 
            text-transform: uppercase; font-size: 0.7rem;
            opacity: 0.4;
            transition: 1.5s ease-in-out;
        }

        .sync-text.active {
            opacity: 1;
            letter-spacing: 14px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body onclick="initiateSync()">

    <div class="somatic-glow"></div>
    <div id="bg" class="bg-anchor"></div>
    
    <main class="sync-container">
        <div class="sync-text" id="status-text">[ TAP TO SYNC ]</div>
    </main>

    <script>
        function initiateSync() {
            // Instant Identity Lock
            localStorage.setItem('KORE_Identity_Locked', 'true');
            
            const text = document.getElementById('status-text');
            text.classList.add('active');
            text.innerText = "IDENTITY LOCKED";

            // Gentle Fade Out
            setTimeout(() => {
                document.body.style.transition = "1.5s ease-in-out";
                document.body.style.background = "#000";
                document.body.style.opacity = "0";
                
                setTimeout(() => { 
                    window.location.href = 'guild.html'; 
                }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
